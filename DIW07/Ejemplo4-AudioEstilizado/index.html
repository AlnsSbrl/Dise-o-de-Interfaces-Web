<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
<!-- Reproductor de audio -->
<div class="audio-contenedor"> <!-- Creamos contenedor -->
    <h2>🎼 Escucha este ejemplo:</h2> <!-- Añadimos un header con emoji-->
    <audio controls preload="none">
        <source src="media/audio.mp3" type="audio/mpeg">
        <source src="audio.ogg" type="audio/ogg"> <!-- más compatibilidad -->
        Tu navegador no soporta el elemento de audio. Puedes <a href="media/audio.mp3">descargar el archivo aquí</a>.
    </audio>
</div>
</body>
</html>
